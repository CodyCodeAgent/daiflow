<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      background: #0a0e1a;
      color: #e0e0e0;
      -webkit-app-region: drag;
      user-select: none;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── 主内容区（固定高度，不会因子进度变化而移动） ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 40px;
      /* 留出底部日志栏的空间，避免内容被遮挡 */
      padding-bottom: 48px;
    }

    /* Logo */
    .logo {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #00d4e8;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 12px;
      color: #445566;
      letter-spacing: 1px;
      margin-bottom: 48px;
    }

    /* 步骤指示器 */
    .steps {
      display: flex;
      gap: 6px;
      margin-bottom: 32px;
    }
    .step-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(0, 212, 232, 0.15);
      transition: background 0.3s ease;
    }
    .step-dot.done   { background: #00d4e8; }
    .step-dot.active { background: rgba(0, 212, 232, 0.5); animation: pulse 1s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

    /* 进度条 */
    .progress-wrap {
      width: 260px;
      margin-bottom: 24px;
    }
    .progress-track {
      height: 3px;
      background: rgba(0, 212, 232, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00b4c8 0%, #00d4e8 100%);
      width: 0%;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 状态文字（固定高度区域，不撑开布局） */
    .status-area {
      height: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .status-text {
      font-size: 13px;
      color: #99aabb;
      text-align: center;
    }
    .status-sub {
      font-size: 11px;
      color: #445566;
      text-align: center;
      font-family: 'Courier New', monospace;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* 子进度条（固定高度，隐藏时 opacity:0 不撑开布局） */
    .sub-progress {
      width: 260px;
      margin-top: 20px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .sub-progress.visible { opacity: 1; }
    .sub-track {
      height: 2px;
      background: rgba(0, 212, 232, 0.08);
      border-radius: 1px;
      overflow: hidden;
      margin-bottom: 5px;
    }
    .sub-fill {
      height: 100%;
      background: rgba(0, 212, 232, 0.4);
      width: 0%;
      transition: width 0.2s ease;
    }
    .sub-label {
      font-size: 10px;
      color: #445566;
      text-align: right;
      font-family: 'Courier New', monospace;
    }

    /* 首次安装提示 */
    .hint {
      margin-top: 28px;
      font-size: 11px;
      color: #334455;
      text-align: center;
    }

    /* ── 底部日志栏（固定在底部，不影响主内容布局） ── */
    .log-bar {
      flex-shrink: 0;
      border-top: 1px solid rgba(0, 212, 232, 0.08);
      -webkit-app-region: no-drag;
    }
    .log-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 36px;
      cursor: pointer;
      background: transparent;
      transition: background 0.15s;
    }
    .log-toggle:hover { background: rgba(0, 212, 232, 0.04); }
    .log-toggle-label {
      font-size: 11px;
      color: #445566;
    }
    .log-toggle-icon {
      font-size: 9px;
      color: #445566;
      transition: transform 0.2s;
    }
    .log-toggle-icon.expanded { transform: rotate(180deg); }

    .log-panel {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(0, 0, 0, 0.3);
    }
    .log-panel.expanded { max-height: 160px; }

    .log-content {
      height: 160px;
      overflow-y: auto;
      padding: 8px 16px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      line-height: 1.6;
      color: #445566;
    }
    .log-content::-webkit-scrollbar { width: 4px; }
    .log-content::-webkit-scrollbar-track { background: transparent; }
    .log-content::-webkit-scrollbar-thumb { background: rgba(0,212,232,0.15); border-radius: 2px; }

    .log-entry { word-break: break-all; }
    .log-entry.error   { color: #ff6b6b; }
    .log-entry.warning { color: #ffaa44; }
    .log-entry.success { color: #00d4e8; }
  </style>
</head>
<body>

  <!-- 主内容 -->
  <div class="main">
    <div class="logo">DaiFlow</div>
    <div class="tagline">AI-POWERED DEV WORKBENCH</div>

    <!-- 步骤点 -->
    <div class="steps" id="steps">
      <div class="step-dot active" data-index="0"></div>
      <div class="step-dot" data-index="1"></div>
      <div class="step-dot" data-index="2"></div>
      <div class="step-dot" data-index="3"></div>
      <div class="step-dot" data-index="4"></div>
      <div class="step-dot" data-index="5"></div>
    </div>

    <!-- 主进度条 -->
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- 状态文字（固定高度） -->
    <div class="status-area">
      <div class="status-text" id="statusText">正在初始化...</div>
      <div class="status-sub" id="statusSub"></div>
    </div>

    <!-- 子进度条（固定高度，opacity 控制显隐） -->
    <div class="sub-progress" id="subProgress">
      <div class="sub-track">
        <div class="sub-fill" id="subFill"></div>
      </div>
      <div class="sub-label" id="subLabel"></div>
    </div>

    <div class="hint" id="hint">首次启动需安装依赖，约需 1–3 分钟</div>
  </div>

  <!-- 底部日志栏 -->
  <div class="log-bar">
    <div class="log-toggle" id="logToggle">
      <span class="log-toggle-label">详细日志</span>
      <span class="log-toggle-icon" id="logIcon">▼</span>
    </div>
    <div class="log-panel" id="logPanel">
      <div class="log-content" id="logContent"></div>
    </div>
  </div>

  <script>
    const state = { totalStages: 6, completedStages: 0, logsExpanded: false };

    const $ = id => document.getElementById(id);
    const dots = document.querySelectorAll('.step-dot');

    function updateProgress(completed) {
      state.completedStages = completed;
      $('progressFill').style.width = `${(completed / state.totalStages) * 100}%`;
      dots.forEach((dot, i) => {
        dot.className = 'step-dot' + (i < completed ? ' done' : i === completed ? ' active' : '');
      });
      // 完成后隐藏首次提示
      if (completed >= state.totalStages) $('hint').style.display = 'none';
    }

    function updateSubProgress(data) {
      const el = $('subProgress');
      if (!data || !data.progress) {
        el.classList.remove('visible');
        return;
      }
      const { current, total, label } = data.progress;
      el.classList.add('visible');
      $('subFill').style.width = `${Math.min((current / total) * 100, 100)}%`;
      $('subLabel').textContent = label ? `${current}/${total}  ${label}` : `${current}/${total}`;
    }

    function addLog(msg, type = 'info') {
      // 过滤 pip notice 类噪音
      if (msg.includes('[notice]') || msg.includes('--upgrade pip')) return;
      const el = document.createElement('div');
      el.className = `log-entry ${type}`;
      el.textContent = msg;
      $('logContent').appendChild(el);
      $('logContent').scrollTop = $('logContent').scrollHeight;
    }

    // 日志折叠/展开（用 max-height 动画，不撑开主内容）
    $('logToggle').addEventListener('click', () => {
      state.logsExpanded = !state.logsExpanded;
      $('logPanel').classList.toggle('expanded', state.logsExpanded);
      $('logIcon').classList.toggle('expanded', state.logsExpanded);
    });

    // 接收主进程消息
    window.electronAPI.onStatus(data => {
      if (typeof data === 'string') {
        $('statusText').textContent = data;
        addLog(data);
        return;
      }

      const { type, message, detail } = data;

      switch (type) {
        case 'status':
          if (message) { $('statusText').textContent = message; $('statusSub').textContent = ''; }
          if (detail) addLog(detail);
          break;

        case 'progress':
          if (message) $('statusText').textContent = message;
          if (detail)  $('statusSub').textContent = detail;
          updateSubProgress(data);
          break;

        case 'log':
          if (detail) addLog(detail);
          break;

        case 'error':
          if (message) { $('statusText').textContent = message; addLog(message, 'error'); }
          break;

        case 'stage-complete':
          updateProgress(state.completedStages + 1);
          updateSubProgress(null);
          $('statusSub').textContent = '';
          break;
      }
    });
  </script>
</body>
</html>
