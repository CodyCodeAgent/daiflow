name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # required to create GitHub Release and upload assets

jobs:
  # ── macOS (arm64 + x64) ────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Install Electron deps
        run: cd electron && npm ci

      - name: Download bundled Python runtimes
        run: bash electron/scripts/download-python.sh

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Package (macOS)
        run: cd electron && npx electron-builder --mac --config electron-builder-nosign.yml --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: |
            electron/dist/*.dmg
            electron/dist/*.zip
          if-no-files-found: error

  # ── Create GitHub Release ───────────────────────────────────────────────────
  release:
    needs: [build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          awk "/^## \[${{ steps.version.outputs.version }}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.txt
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          cat release_notes.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DaiFlow v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
