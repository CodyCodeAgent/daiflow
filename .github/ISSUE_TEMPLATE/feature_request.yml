name: Feature Request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? What's missing?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - DevFlow workflow
        - Conversations
        - Project knowledge generation
        - Runner backends
        - Electron desktop app
        - API / backend
        - Frontend / UI
        - Other
