name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: DaiFlow Version
      description: Check the `VERSION` file or run `daiflow --version`
    validations:
      required: true

  - type: dropdown
    id: runner
    attributes:
      label: Runner Backend
      options:
        - Cody SDK
        - Claude Code CLI
        - Cursor IDE
        - Not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste relevant output from `~/.daiflow/sessions/` or `daiflow.log`
      render: text
